services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pet_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pet_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pet_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pet_user} -d ${POSTGRES_DB:-pet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet_network

  # ── pgAdmin (optional UI for local development) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pet_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet_network
    profiles:
      - tools # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
    driver: local

networks:
  pet_network:
    driver: bridge
